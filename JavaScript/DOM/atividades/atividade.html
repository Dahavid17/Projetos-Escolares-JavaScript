<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="atividades.css">
</head> 
<body>
    <h2>ATIVIDADE 1 - Mudar cor do título</h2>
    <h1 id="titulo">TEXTO</h1>
    <button id="botao1">Deixar azul</button>
    <button id="botao2">Deixar vermelho</button>

    <hr>

    <h2>ATIVIDADE - 2 - Mostrar e esconder mensagem</h2>

    <p id="mensagem">Esta é uma mensagem importante </p>
    <button id="showHide">Mostrar/Esconder mensagem</button>

    <hr>

    <h2>ATIVIDADE - 3 - Contador de caracteres</h2>
    <input type="text" id="campoTexto" placeholder="Digite algo...">
    <p>Contador de caracteres:(<span id="contador">0</span>)</p>

    <hr>

    <h2>ATIVIDADE - 4 - Contador de clicks</h2>
    <button id="botaoClick">Clique aqui</button>
    <p>Contador de clicks: (<span id="contadorClick">0</span>)</p>


    <hr>

    <h2>ATIVIDADE - 5 - Criar elementos dinaminacente</h2>
    <input type="text" id="inputTexto" placeholder="Digite um item...">
    <button id="adicionarItem">Adicionar item</button>
    <ul id="lista"></ul>
    

    <script src="atividade.js"></script>
</body>
</html>
